<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWA Debug - POS App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 1rem;
      color: white;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      text-align: center;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    
    .status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      margin-bottom: 0.5rem;
    }
    
    .status.success { background: rgba(34, 197, 94, 0.3); }
    .status.error { background: rgba(239, 68, 68, 0.3); }
    .status.warning { background: rgba(251, 191, 36, 0.3); }
    
    .label {
      font-weight: 600;
    }
    
    .value {
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
    }
    
    button {
      width: 100%;
      padding: 1rem;
      background: white;
      color: #667eea;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 0.5rem;
      transition: transform 0.2s;
    }
    
    button:hover {
      transform: scale(1.02);
    }
    
    button:active {
      transform: scale(0.98);
    }
    
    button.danger {
      background: #ef4444;
      color: white;
    }
    
    .log {
      background: rgba(0, 0, 0, 0.4);
      padding: 0.75rem;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 0.5rem;
    }
    
    .log-entry {
      padding: 0.25rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .emoji {
      font-size: 1.5rem;
      margin-right: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 PWA Debug Panel</h1>
    
    <div class="card">
      <h3 style="margin-bottom: 0.75rem;">📊 Service Worker Status</h3>
      
      <div class="status" id="sw-status">
        <div class="label">Service Worker</div>
        <div class="value" id="sw-value">Checking...</div>
      </div>
      
      <div class="status" id="controller-status">
        <div class="label">Controlling Page</div>
        <div class="value" id="controller-value">Checking...</div>
      </div>
      
      <div class="status" id="cache-status">
        <div class="label">Cache Storage</div>
        <div class="value" id="cache-value">Checking...</div>
      </div>
      
      <div class="status" id="network-status">
        <div class="label">Network</div>
        <div class="value" id="network-value">Online</div>
      </div>
    </div>
    
    <div class="card">
      <h3 style="margin-bottom: 0.75rem;">🧪 Quick Tests</h3>
      <button onclick="checkAll()">🔄 Refresh Status</button>
      <button onclick="testOffline()">📵 Test Offline Capability</button>
      <button onclick="testCache()">📦 Check Cache</button>
      <button onclick="goToApp()">🚀 Go to App</button>
    </div>
    
    <div class="card">
      <h3 style="margin-bottom: 0.75rem;">🗑️ Clear Data</h3>
      <button class="danger" onclick="clearServiceWorkers()">Clear Service Workers</button>
      <button class="danger" onclick="clearCaches()">Clear Caches</button>
      <button class="danger" onclick="clearAll()">Clear Everything</button>
    </div>
    
    <div class="card">
      <h3 style="margin-bottom: 0.75rem;">📝 Logs</h3>
      <div class="log" id="logs"></div>
    </div>
  </div>

  <script>
    // Logging
    function log(message, type = 'info') {
      const logs = document.getElementById('logs');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      
      const emoji = {
        'info': 'ℹ️',
        'success': '✅',
        'error': '❌',
        'warning': '⚠️'
      }[type] || 'ℹ️';
      
      entry.textContent = `${emoji} ${new Date().toLocaleTimeString()} - ${message}`;
      logs.insertBefore(entry, logs.firstChild);
      
      // Keep only last 20 entries
      while (logs.children.length > 20) {
        logs.removeChild(logs.lastChild);
      }
    }
    
    // Check all status
    async function checkAll() {
      log('Checking all status...', 'info');
      
      // Service Worker
      const swStatus = document.getElementById('sw-status');
      const swValue = document.getElementById('sw-value');
      
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        
        if (regs.length > 0) {
          swValue.textContent = `✅ ${regs.length} registered`;
          swStatus.className = 'status success';
          
          regs.forEach((reg, i) => {
            const url = reg.active?.scriptURL || 'N/A';
            const state = reg.active?.state || 'N/A';
            log(`SW ${i+1}: ${url.split('/').pop()} (${state})`, 'info');
          });
        } else {
          swValue.textContent = '❌ Not registered';
          swStatus.className = 'status error';
          log('No service worker registered!', 'error');
        }
      } else {
        swValue.textContent = '❌ Not supported';
        swStatus.className = 'status error';
        log('Service Worker not supported!', 'error');
      }
      
      // Controller
      const ctrlStatus = document.getElementById('controller-status');
      const ctrlValue = document.getElementById('controller-value');
      
      if (navigator.serviceWorker.controller) {
        const url = navigator.serviceWorker.controller.scriptURL;
        ctrlValue.textContent = `✅ ${url.split('/').pop()}`;
        ctrlStatus.className = 'status success';
        log('Page is controlled by SW', 'success');
      } else {
        ctrlValue.textContent = '❌ Not controlling';
        ctrlStatus.className = 'status error';
        log('Page NOT controlled by SW!', 'error');
      }
      
      // Cache
      const cacheStatus = document.getElementById('cache-status');
      const cacheValue = document.getElementById('cache-value');
      
      const keys = await caches.keys();
      
      if (keys.length > 0) {
        let totalEntries = 0;
        
        for (const key of keys) {
          const cache = await caches.open(key);
          const requests = await cache.keys();
          totalEntries += requests.length;
          log(`Cache "${key}": ${requests.length} entries`, 'info');
        }
        
        cacheValue.textContent = `✅ ${keys.length} cache(s), ${totalEntries} entries`;
        cacheStatus.className = 'status success';
      } else {
        cacheValue.textContent = '❌ Empty';
        cacheStatus.className = 'status error';
        log('No caches found!', 'error');
      }
      
      // Network
      const networkStatus = document.getElementById('network-status');
      const networkValue = document.getElementById('network-value');
      
      if (navigator.onLine) {
        networkValue.textContent = '🌐 Online';
        networkStatus.className = 'status success';
      } else {
        networkValue.textContent = '📵 Offline';
        networkStatus.className = 'status warning';
      }
      
      log('Status check complete!', 'success');
    }
    
    // Test offline capability
    async function testOffline() {
      log('Testing offline capability...', 'info');
      
      let passed = 0;
      let failed = 0;
      
      // 1. Controller check
      if (navigator.serviceWorker.controller) {
        log('✅ Test 1: Controller exists', 'success');
        passed++;
      } else {
        log('❌ Test 1: No controller!', 'error');
        failed++;
      }
      
      // 2. SW registration check
      const regs = await navigator.serviceWorker.getRegistrations();
      if (regs.length > 0 && regs[0].active?.state === 'activated') {
        log('✅ Test 2: SW activated', 'success');
        passed++;
      } else {
        log('❌ Test 2: SW not activated!', 'error');
        failed++;
      }
      
      // 3. Cache check
      const keys = await caches.keys();
      if (keys.length > 0) {
        log('✅ Test 3: Caches exist', 'success');
        passed++;
      } else {
        log('❌ Test 3: No caches!', 'error');
        failed++;
      }
      
      // 4. Homepage cache check
      const homeMatch = await caches.match('/');
      if (homeMatch) {
        log('✅ Test 4: Homepage cached', 'success');
        passed++;
      } else {
        log('❌ Test 4: Homepage not cached!', 'error');
        failed++;
      }
      
      // Result
      if (failed === 0) {
        alert(`🎉 ALL TESTS PASSED! (${passed}/${passed})\n\nYou can now test offline mode!`);
        log(`✅✅✅ ALL TESTS PASSED (${passed}/${passed}) ✅✅✅`, 'success');
      } else {
        alert(`⚠️ SOME TESTS FAILED\n\nPassed: ${passed}\nFailed: ${failed}\n\nCheck logs for details.`);
        log(`❌ Tests failed: ${failed}/${passed+failed}`, 'error');
      }
    }
    
    // Test cache
    async function testCache() {
      log('Checking cache contents...', 'info');
      
      const keys = await caches.keys();
      
      for (const key of keys) {
        const cache = await caches.open(key);
        const requests = await cache.keys();
        
        log(`📦 ${key}:`, 'info');
        requests.slice(0, 5).forEach(req => {
          log(`   - ${new URL(req.url).pathname}`, 'info');
        });
        
        if (requests.length > 5) {
          log(`   ... and ${requests.length - 5} more`, 'info');
        }
      }
    }
    
    // Clear service workers
    async function clearServiceWorkers() {
      if (!confirm('Clear all service workers?')) return;
      
      log('Clearing service workers...', 'warning');
      
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
      
      log(`✅ Cleared ${regs.length} service worker(s)`, 'success');
      alert('Service workers cleared!');
      
      setTimeout(() => checkAll(), 500);
    }
    
    // Clear caches
    async function clearCaches() {
      if (!confirm('Clear all caches?')) return;
      
      log('Clearing caches...', 'warning');
      
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
      
      log(`✅ Cleared ${keys.length} cache(s)`, 'success');
      alert('Caches cleared!');
      
      setTimeout(() => checkAll(), 500);
    }
    
    // Clear all
    async function clearAll() {
      if (!confirm('Clear EVERYTHING (SW + Caches)?')) return;
      
      log('Clearing everything...', 'warning');
      
      // SWs
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
      log(`✅ Cleared ${regs.length} SW(s)`, 'success');
      
      // Caches
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
      log(`✅ Cleared ${keys.length} cache(s)`, 'success');
      
      alert('Everything cleared!\n\nReload page to re-register SW.');
    }
    
    // Go to app
    function goToApp() {
      window.location.href = '/';
    }
    
    // Network status
    window.addEventListener('online', () => {
      document.getElementById('network-value').textContent = '🌐 Online';
      document.getElementById('network-status').className = 'status success';
      log('Network: Online', 'success');
    });
    
    window.addEventListener('offline', () => {
      document.getElementById('network-value').textContent = '📵 Offline';
      document.getElementById('network-status').className = 'status warning';
      log('Network: Offline', 'warning');
    });
    
    // Auto-check on load
    window.addEventListener('load', () => {
      log('PWA Debug Panel loaded', 'info');
      checkAll();
    });
  </script>
</body>
</html>
